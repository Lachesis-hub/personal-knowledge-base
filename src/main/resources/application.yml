server:
  port: 8081

spring:
    servlet:
      multipart:
        enabled: true
        max-file-size: 50MB
        max-request-size: 50MB

    datasource:
      url: jdbc:mysql://localhost:3306/personal_kb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      username: root
      password: 123456
      driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.personalkb.entity
  configuration:
    map-underscore-to-camel-case: true